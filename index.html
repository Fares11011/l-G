<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LEARNING & GROWTH | L&G</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Tajawal', 'sans-serif'],
            },
            colors: {
              primary: {
                50: '#f0f4f8',
                100: '#d9e2ec',
                200: '#bcccdc',
                300: '#9fb3c8',
                400: '#829ab1',
                500: '#627d98',
                600: '#486581',
                700: '#334e68',
                800: '#243b53',
                900: '#102a43',
              },
              brand: {
                 DEFAULT: '#0f172a',
                 light: '#3b82f6',
                 dark: '#020617',
                 accent: '#0ea5e9'
              },
              secondary: {
                500: '#3b82f6',
                600: '#2563eb',
              },
              accent: {
                500: '#f59e0b',
              }
            },
            animation: {
              'glow': 'glow 2s ease-in-out infinite alternate',
            },
            keyframes: {
              glow: {
                '0%': { boxShadow: '0 0 5px rgba(59, 130, 246, 0.2), 0 0 10px rgba(59, 130, 246, 0.1)' },
                '100%': { boxShadow: '0 0 20px rgba(59, 130, 246, 0.6), 0 0 30px rgba(14, 165, 233, 0.4)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Tajawal', sans-serif;
        background-color: #f0f9ff;
        overflow-x: hidden;
        min-height: 100vh;
        position: relative;
      }
      .dark body {
        background-color: #020617;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.5); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(100, 116, 139, 0.8); }

      /* Glassmorphism Class */
      .glass-panel {
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 
          0 8px 32px rgba(0, 0, 0, 0.05),
          inset 0 0 0 1px rgba(255, 255, 255, 0.3);
        position: relative;
        transition: all 0.3s ease;
      }

      .dark .glass-panel {
        background: rgba(15, 23, 42, 0.6); /* Darker glass for dark mode */
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }

      /* Shiny Edge Effect (User Request) */
      .glass-panel::before {
        content: '';
        position: absolute;
        top: 0; inset-inline-start: 0; inset-inline-end: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
        opacity: 0.7;
        border-radius: inherit;
      }

      /* 3D Flip Effects */
      .perspective-1000 { perspective: 1000px; }
      .transform-style-3d { transform-style: preserve-3d; }
      .backface-hidden { backface-visibility: hidden; }
      .rotate-y-180 { transform: rotateY(180deg); }
      .glass-panel::after {
        content: '';
        position: absolute;
        top: 0; inset-inline-start: 0;
        width: 1px;
        height: 100%;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.8), transparent, rgba(255, 255, 255, 0.3));
        opacity: 0.7;
        border-radius: inherit;
      }

      /* Hover Glow Effect */
      .glass-panel:hover {
        box-shadow: 
          0 10px 40px rgba(59, 130, 246, 0.15),
          inset 0 0 20px rgba(255, 255, 255, 0.5);
        border-color: rgba(59, 130, 246, 0.3);
      }
      .dark .glass-panel:hover {
        box-shadow: 
          0 10px 40px rgba(14, 165, 233, 0.15),
          inset 0 0 20px rgba(255, 255, 255, 0.05);
        border-color: rgba(14, 165, 233, 0.3);
      }

      /* Interactive Background Bubbles */
      .bubbles-container {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
      }
      
      .bubble {
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8), rgba(59, 130, 246, 0.2));
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        opacity: 0.6;
        transition: transform 0.2s ease-out;
        will-change: transform;
      }

      .dark .bubble {
         background: radial-gradient(circle at 30% 30%, rgba(59, 130, 246, 0.4), rgba(15, 23, 42, 0.0));
         box-shadow: 0 0 15px rgba(14, 165, 233, 0.2);
      }

      /* Specific Animations for floating */
      @keyframes float {
        0%, 100% { transform: translateY(0) translateX(0); }
        50% { transform: translateY(-20px) translateX(10px); }
      }
      .float-anim { animation: float 6s ease-in-out infinite; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
</head>
  <body>
    <!-- Interactive Background -->
    <div class="bubbles-container" id="bubbles">
       <!-- Bubbles will be generated by JS -->
    </div>

    <div id="root"></div>

    <script>
      // Generate Bubbles
      const container = document.getElementById('bubbles');
      const bubbleCount = 15;
      
      for(let i=0; i<bubbleCount; i++) {
        const b = document.createElement('div');
        b.classList.add('bubble', 'float-anim');
        
        const size = Math.random() * 80 + 20; // 20px to 100px
        b.style.width = `${size}px`;
        b.style.height = `${size}px`;
        
        b.style.left = `${Math.random() * 100}%`;
        b.style.top = `${Math.random() * 100}%`;
        
        // Random animation delay
        b.style.animationDelay = `${Math.random() * 5}s`;
        b.style.animationDuration = `${5 + Math.random() * 10}s`;
        
        // Data attributes for interactivity
        b.dataset.speed = Math.random() * 0.5 + 0.1;
        
        container.appendChild(b);
      }
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
